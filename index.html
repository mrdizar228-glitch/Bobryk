<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Моя Перша Нейромережа</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; border-radius: 5px; border: none; }
        button { background-color: #FF3B6B; color: white; cursor: pointer; font-weight: bold; }
        #result { font-size: 24px; margin-top: 20px; color: #00FFCC; }
    </style>
    
    <script src="https://unpkg.com/brain.js"></script>
</head>
<body>

    <h1>🧠 Мозок Дізара: Аналізатор Слів</h1>
    <p>Я навчився відрізняти добрі слова від поганих. Напиши щось!</p>

    <input type="text" id="userInput" placeholder="Наприклад: круто або жах">
    <button onclick="askAI()">Перевірити ШІ</button>

    <div id="result">Тут буде відповідь нейромережі...</div>

    <script>
        // --- ПОЧАТОК JAVASCRIPT --- //

        // КРОК 1: Створюємо новий порожній мозок (LSTM - це тип мережі для тексту)
        const net = new brain.recurrent.LSTM();

        // КРОК 2: Тренуємо мозок. Даємо йому приклади!
        // Ти можеш додавати сюди свої слова пізніше.
        net.train([
            { input: 'супер', output: 'ПОЗИТИВ 🟢' },
            { input: 'клас', output: 'ПОЗИТИВ 🟢' },
            { input: 'добре', output: 'ПОЗИТИВ 🟢' },
            
            { input: 'погано', output: 'НЕГАТИВ 🔴' },
            { input: 'жах', output: 'НЕГАТИВ 🔴' },
            { input: 'фу', output: 'НЕГАТИВ 🔴' }
        ], { iterations: 100 }); // iterations - це скільки разів мозок перечитує ці слова, щоб запам'ятати

        // КРОК 3: Функція, яка запускається, коли ти натискаєш кнопку
        function askAI() {
            // Беремо текст, який ти написав в input
            const text = document.getElementById('userInput').value.toLowerCase();
            
            // Питаємо нейромережу! run() - це запуск аналізу
            const answer = net.run(text);
            
            // Виводимо результат на екран. Якщо мозок не знає слова, він нічого не видасть
            if (answer === "") {
                document.getElementById('result').innerText = "Я ще не знаю таких слів, мені треба більше тренувань!";
            } else {
                document.getElementById('result').innerText = "Я думаю, що це: " + answer;
            }
        }
    </script>
</body>
</html>
