<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ШІ Бобрик: Хмарна Версія V3 (Редактор)</title>
    <style>
        body { 
            background-color: #0B0B14; 
            color: #FFFFFF; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            padding: 20px; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #FF3B6B; }
        
        .stats {
            background-color: #1A1A2B;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #FF3B6B;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .coins { color: #FFD700; font-weight: bold; font-size: 24px; }
        .ai-mood { color: #00FFCC; font-style: italic; font-size: 16px; }

        input { padding: 12px; font-size: 16px; width: 60%; border-radius: 5px; border: 1px solid #8E8E9F; background: #131320; color: white; margin-bottom: 15px;}
        button { padding: 12px 20px; font-size: 16px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.2s;}
        
        .btn-guess { background-color: #8A2BE2; color: white; }
        .btn-pos { background-color: #28a745; color: white; display: none; }
        .btn-neg { background-color: #dc3545; color: white; display: none; }
        .btn-clear { background-color: #ff0000; color: white; font-size: 14px; padding: 8px 15px; margin-top: 30px; border: 1px solid #ffaaaa; }
        
        /* Стиль для кнопки точкового видалення */
        .btn-delete-item {
            background-color: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .btn-delete-item:hover { background-color: #ff4444; color: white; }

        button:hover { opacity: 0.8; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        #ai-answer-box {
            font-size: 22px;
            margin: 20px 0;
            min-height: 40px;
            color: #FF3B6B;
        }

        .database-view {
            background-color: #000;
            border: 1px solid #00FFCC;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            text-align: left;
            font-size: 14px;
            color: #00FFCC;
            margin-top: 20px;
        }
        
        /* Робимо так, щоб кнопка була праворуч від тексту */
        .db-entry { 
            border-bottom: 1px dashed #333; 
            padding: 8px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .cloud-status { color: #28a745; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
    <script src="https://unpkg.com/brain.js"></script>
</head>
<body>

    <div class="container">
        <h1>🧠 ШІ Дізара: Хмарний Адмін ☁️</h1>
        <div class="cloud-status" id="cloudStatus">Підключення до Firebase...</div>
        
        <div class="stats">
            Баланс ШІ: <span class="coins" id="coinCounter">0 💰</span><br>
            <span class="ai-mood" id="aiMood">"Чекаю завантаження спогадів..."</span>
        </div>

        <input type="text" id="userInput" placeholder="Введи слово (напр. 'геніально')">
        <br>
        <button class="btn-guess" id="btnGuess">Хай ШІ вгадає!</button>

        <div id="ai-answer-box"></div>

        <div id="feedback-controls">
            <button class="btn-pos" id="btnPos">👍 Це було ПОЗИТИВНЕ</button>
            <button class="btn-neg" id="btnNeg">👎 Це було НЕГАТИВНЕ</button>
        </div>

        <h3>База даних (Дані з Хмари):</h3>
        <div class="database-view" id="databaseView"></div>

        <button class="btn-clear" id="btnClear">⚠️ СТЕРТИ ВСЮ ПАМ'ЯТЬ БАЗИ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBzULZynTaeLfR1oWccTB2vydEm8I3cg_A",
          authDomain: "ai-bobryk.firebaseapp.com",
          databaseURL: "https://ai-bobryk-default-rtdb.firebaseio.com",
          projectId: "ai-bobryk",
          storageBucket: "ai-bobryk.firebasestorage.app",
          messagingSenderId: "414534255177",
          appId: "1:414534255177:web:53d7d8f20f2369861f7598"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const wordsRef = ref(db, 'ai_memory/words');
        const coinsRef = ref(db, 'ai_memory/coins');

        const net = new brain.recurrent.LSTM();
        let aiCoins = 0;
        let currentWord = "";
        let currentGuess = "";
        let trainingData = [];

        // 1. ЗАВАНТАЖЕННЯ МОНЕТ
        onValue(coinsRef, (snapshot) => {
            const data = snapshot.val();
            if (data !== null) {
                aiCoins = data;
                document.getElementById('coinCounter').innerText = `${aiCoins} 💰`;
            } else {
                aiCoins = 0;
                document.getElementById('coinCounter').innerText = `0 💰`;
            }
        });

        // 2. ЗАВАНТАЖЕННЯ СЛІВ (ІЗ КНОПКАМИ ТОЧКОВОГО ВИДАЛЕННЯ)
        onValue(wordsRef, (snapshot) => {
            const data = snapshot.val();
            const dbView = document.getElementById('databaseView');
            dbView.innerHTML = ''; 
            trainingData = [];

            if (data) {
                // Використовуємо Object.entries, щоб дістати і КЛЮЧ, і САМЕ СЛОВО
                Object.entries(data).forEach(([key, entry]) => {
                    trainingData.push({ input: entry.word, output: entry.answer });
                    
                    // Створюємо контейнер для рядка
                    const newEntry = document.createElement('div');
                    newEntry.className = 'db-entry';
                    
                    // Створюємо текст
                    const textSpan = document.createElement('span');
                    textSpan.innerText = `[FIREBASE] "${entry.word}" -> [${entry.encrypted}] | Відповідь: ${entry.answer === 'ПОЗИТИВ' ? '1' : '0'}`;
                    
                    // Створюємо кнопку точкового видалення
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerText = '❌ Видалити';
                    deleteBtn.className = 'btn-delete-item';
                    
                    // Вішаємо логіку видалення на цю кнопку
                    deleteBtn.onclick = () => {
                        // Кажемо базі видалити саме цей унікальний 'key'
                        remove(ref(db, `ai_memory/words/${key}`));
                        document.getElementById('aiMood').innerText = `"Слово '${entry.word}' успішно стерто з пам'яті!"`;
                    };

                    // Додаємо текст і кнопку в рядок, а рядок — на екран
                    newEntry.appendChild(textSpan);
                    newEntry.appendChild(deleteBtn);
                    dbView.prepend(newEntry);
                });

                document.getElementById('cloudStatus').innerText = "✅ Firebase підключено!";
                net.train(trainingData, { iterations: 50 });
            } else {
                trainingData = [
                    { input: 'супер', output: 'ПОЗИТИВ' },
                    { input: 'жах', output: 'НЕГАТИВ' }
                ];
                net.train(trainingData, { iterations: 50 });
                dbView.innerHTML = '<div class="db-entry" style="color:#ffaaaa; justify-content:center;">База даних порожня. Запиши перше слово!</div>';
                document.getElementById('cloudStatus').innerText = "✅ База чиста. Можна писати з нуля!";
            }
        });

        // 3. ВГАДУВАННЯ
        document.getElementById('btnGuess').addEventListener('click', () => {
            currentWord = document.getElementById('userInput').value.toLowerCase().trim();
            if(!currentWord) return;

            currentGuess = net.run(currentWord);
            if (currentGuess === "") {
                currentGuess = (Math.random() > 0.5) ? 'ПОЗИТИВ' : 'НЕГАТИВ';
            }

            document.getElementById('ai-answer-box').innerHTML = `Я думаю, що слово <b>"${currentWord}"</b> — це <b>${currentGuess}</b>. Я вгадала?`;
            
            document.getElementById('btnGuess').style.display = 'none';
            document.getElementById('btnPos').style.display = 'inline-block';
            document.getElementById('btnNeg').style.display = 'inline-block';
            document.getElementById('userInput').disabled = true;
        });

        // 4. ВІДПРАВКА ДАНИХ
        function handleFeedback(actualAnswer) {
            let isDuplicate = trainingData.some(entry => entry.input === currentWord);

            if (isDuplicate) {
                document.getElementById('aiMood').innerText = `"Гей! Я вже знаю слово '${currentWord}'! Не дури мене дублями!"`;
                document.getElementById('ai-answer-box').innerText = "Слово вже в базі! Спробуй інше.";
            } else {
                if (currentGuess === actualAnswer) {
                    aiCoins += 1;
                    document.getElementById('aiMood').innerText = `"ЄЄЄ! Нове слово і монетки летять у хмару!"`;
                } else {
                    document.getElementById('aiMood').innerText = `"Ого, нове слово! Записую правильну відповідь у Firebase."`;
                }

                let encryptedWord = currentWord.split('').map(char => char.charCodeAt(0)).join(' ');

                set(coinsRef, aiCoins);
                push(wordsRef, {
                    word: currentWord,
                    answer: actualAnswer,
                    encrypted: encryptedWord
                });
                document.getElementById('ai-answer-box').innerText = "Записано! Давай наступне.";
            }

            document.getElementById('btnGuess').style.display = 'inline-block';
            document.getElementById('btnPos').style.display = 'none';
            document.getElementById('btnNeg').style.display = 'none';
            document.getElementById('userInput').disabled = false;
            document.getElementById('userInput').value = "";
            document.getElementById('userInput').focus();
        }

        document.getElementById('btnPos').addEventListener('click', () => handleFeedback('ПОЗИТИВ'));
        document.getElementById('btnNeg').addEventListener('click', () => handleFeedback('НЕГАТИВ'));

        // 5. КНОПКА ЗНИЩЕННЯ БАЗИ (WIPE)
        document.getElementById('btnClear').addEventListener('click', () => {
            let confirmWipe = confirm("УВАГА! Ти точно хочеш стерти ШІ всю пам'ять і обнулити монети?");
            
            if (confirmWipe) {
                remove(wordsRef);
                set(coinsRef, 0);
                document.getElementById('aiMood').innerText = `"Моя пам'ять стерта... Хто я? Де я?"`;
                document.getElementById('ai-answer-box').innerText = "";
            }
        });

    </script>
</body>
</html>
